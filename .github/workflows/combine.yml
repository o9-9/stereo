name: Combine Repos

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  combine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Install git-filter-repo
        run: |
          python3 -m pip install --user git-filter-repo
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Prepare workspace
        run: |
          mkdir -p work patches

      - name: Clone and nest source repos
        run: |
          repos=(
            "https://github.com/ProdHallow/Discord-Stereo-Windows-MacOS-Linux"
            "https://github.com/ProdHallow/Discord-Node-Patcher"
            "https://github.com/ProdHallow/Discord-Voice-Node-Offset-Finder"
            "https://github.com/ProdHallow/Discord-Stereo-Installer"
            "https://github.com/ProdHallow/voice-backup"
            "https://github.com/ProdHallow/installer"
          )

          for repo in "${repos[@]}"; do
            name=$(basename "$repo")
            git clone --quiet "$repo" "work/$name"
            cd "work/$name"
            git filter-repo --force --to-subdirectory-filter "$name"
            cd - >/dev/null
          done

      - name: Collect commits
        run: |
          > commits.txt

          for dir in work/*; do
            repo=$(basename "$dir")
            cd "$dir"
            git log --reverse --format="%ct %H $repo" >> ../../commits.txt
            cd - >/dev/null
          done

      - name: Sort commits chronologically
        run: |
          sort -n commits.txt > commits_sorted.txt

      - name: Generate patches
        run: |
          i=0
          while read -r ts sha repo; do
            cd "work/$repo"
            git format-patch -1 "$sha" --stdout > "../../patches/$(printf "%06d" $i)-$repo.patch"
            cd - >/dev/null
            i=$((i+1))
          done < commits_sorted.txt

      - name: Apply patches
        run: |
          git checkout -B main

          for p in patches/*.patch; do
            git am --keep-non-patch "$p" || git am --skip
          done

      - name: Push result
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}
          git push origin main --force
